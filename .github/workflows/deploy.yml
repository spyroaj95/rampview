# Build and deploy the static app to GitHub Pages on every push to main.
#
# Privacy note (C1): CI checks out the committed tree only. The real
# src/data/pipeline.json is gitignored and can never exist here, so every
# public deploy runs on the dummy sample data: that IS the founder demo,
# and the passphrase gate stays disengaged (see src/lib/gate.ts).

name: deploy-pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
